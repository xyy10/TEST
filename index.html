<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>导航站</title>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI";
    background:#f5f7fb;
    display:flex;
}

/* 左侧 */
.sidebar{
    width:220px;
    background:#fff;
    border-right:1px solid #eee;
    padding:20px;
    position:fixed;
    height:100%;
}
.sidebar h2{
    font-size:16px;
    margin-bottom:10px;
}
.sidebar li{
    list-style:none;
    padding:8px;
    border-radius:6px;
    cursor:pointer;
    color:#666;
}
.sidebar li:hover,
.sidebar li.active{
    background:#eef3ff;
    color:#3b5cff;
}

/* 主体 */
.main{
    margin-left:240px;
    padding:30px;
    width:100%;
}

/* 搜索 */
.search{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-bottom:30px;
}

/* 分类 */
.category{
    margin-bottom:40px;
}
.category h3{
    margin-bottom:15px;
}

/* 卡片 */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
    gap:18px;
}

.card{
    background:#fff;
    padding:18px;
    border-radius:14px;
    text-align:center;
    cursor:pointer;
    transition:.25s;
    border:1px solid #eee;
}
.card:hover{
    transform:translateY(-8px) scale(1.03);
    box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

/* 图标 */
.icon{
    width:60px;
    height:60px;
    border-radius:50%;
    margin:0 auto 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-weight:bold;
}

/* 渐变 */
.g1{background:linear-gradient(135deg,#5f9cff,#3b5cff);}
.g2{background:linear-gradient(135deg,#ff7a7a,#ff3d3d);}
.g3{background:linear-gradient(135deg,#34d399,#059669);}
.g4{background:linear-gradient(135deg,#fbbf24,#f59e0b);}
.g5{background:linear-gradient(135deg,#a78bfa,#7c3aed);}
.g6{background:linear-gradient(135deg,#fb7185,#e11d48);}
</style>
</head>

<body>

<!-- 左侧 -->
<div class="sidebar">
<h2>导航</h2>
<ul>
<li data-id="ai">AI工具</li>
<li data-id="dev">开发工具</li>
<li data-id="japanese">资料</li> 
</ul>
</div>


<!-- 主体 -->
<div class="main">

<input class="search" placeholder="搜索网站..." onkeyup="search()">

<!-- AI -->
<div class="category" id="ai">
<h3>AI工具</h3>
<div class="grid">

<div class="card" data-name="chatgpt" onclick="openSite('https://chat.openai.com')">
<div class="icon g1">C</div>ChatGPT
</div>

<div class="card" data-name="baidu" onclick="openSite('https://www.baidu.com')">
    <div class="icon g2">百</div>
    百度
</div>

<div class="card" data-name="claude" onclick="openSite('https://claude.ai')">
<div class="icon g3">C</div>Claude
</div>

<div class="card" data-name="midjourney" onclick="openSite('https://midjourney.com')">
<div class="icon g4">M</div>Midjourney
</div>

</div>
</div>



<!-- 开发 -->
<div class="category" id="dev">
<h3>开发工具</h3>
<div class="grid">

<div class="card" data-name="github" onclick="openSite('https://github.com')">
<div class="icon g6">G</div>GitHub
</div>


</div>
</div>
<!-- 日语分类（独立） -->
<div class="category" id="japanese">
    <h3>资料</h3>

    <div class="grid">

        <div class="card" onclick="openSite('https://pan.baidu.com/s/1Lf0UGZkZroplbem2XrYpcw?pwd=7ui4')">
            <div class="icon g1">日</div>
            日语资源
        </div>

        <div class="card" onclick="openSite('https://pan.baidu.com/s/1o2__ASuEbLHaAWp4aWwdfA?pwd=ca4j')">
            <div class="icon g1">法</div>
            法语资源
        </div>

        <div class="card" onclick="openSite('https://pan.baidu.com/s/1Zyrrz_9lZAlg9CO2r0iuZQ?pwd=h5am')">
            <div class="icon g1">雅</div>
            雅思
        </div>

        <div class="card" onclick="openSite('https://pan.baidu.com/s/1k5uJp6i-Cci68jrZYdZZag?pwd=1xp3')">
            <div class="icon g1">SD</div>
            stablediffusion
        </div>

    </div>

</div>

<script>

/* 打开网站 */
function openSite(url){
    window.open(url)
}

/* 搜索 */
function search(){
    let input=document.querySelector(".search").value.toLowerCase()
    document.querySelectorAll(".card").forEach(card=>{
        let name=card.dataset.name
        card.style.display=name.includes(input)?"":"none"
    })
}

/* 左侧跳转 */
document.querySelectorAll(".sidebar li").forEach(item=>{
    item.onclick=()=>{
        let id=item.dataset.id
        document.getElementById(id).scrollIntoView({behavior:"smooth"})
    }
})

</script>

</body>
</html>
